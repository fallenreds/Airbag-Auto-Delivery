version: '3.7'

services: 
  backend:
    build: backend/
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    env_file:
      - backend/.env 
    depends_on:
      - redis    
  bot:
    build: bot/
    ports:
      - "88:88"
      - "5678:5678"
    volumes:
      - type: bind
        source: ./props.json
        target: /bot/props.json
        read_only: false
    env_file:
      - ./bot/.env
  celery:
    build: backend/
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
